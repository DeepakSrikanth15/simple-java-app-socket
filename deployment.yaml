apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app   # ✅ FIXED
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: deepaksrikanth15/java-app:latest
          ports:
            - containerPort: 8085   # ✅ match your app port

---
apiVersion: v1
kind: Service
metadata:
  name: java-service   # ✅ FIXED
spec:
  type: NodePort
  selector:
    app: java-app
  ports:
    - port: 80
      targetPort: 8085
      nodePort: 30008
